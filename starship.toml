# Fast starship config - optimized for tmux
# Reduces prompt delay by disabling slow modules

format = """$directory$git_branch$git_status$cmd_duration$status
$character"""

command_timeout = 100
palette = "cyberdream"

[palettes.cyberdream]
# scottmckendry/cyberdream palette
bg = "#16181a"
surface = "#3c4048"
gray = "#9aa3b5"
text = "#ffffff"
red = "#ff6e5e"
orange = "#ffbd5e"
yellow = "#f1ff5e"
green = "#5eff6c"
cyan = "#5ef1ff"
blue = "#5ea1ff"
magenta = "#bd5eff"
pink = "#ff5ea0"
# semantic aliases (so existing module styles keep working)
sapphire = "#5ea1ff"
mauve = "#bd5eff"
teal = "#5ef1ff"
sky = "#5ef1ff"
peach = "#ffbd5e"
subtext1 = "#ffffff"
subtext0 = "#9aa3b5"
overlay2 = "#9aa3b5"
overlay1 = "#9aa3b5"
overlay0 = "#9aa3b5"
surface2 = "#3c4048"
surface1 = "#3c4048"
surface0 = "#3c4048"
base = "#16181a"
mantle = "#16181a"
crust = "#16181a"

[nodejs]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[java]
disabled = true

[ruby]
disabled = true

[php]
disabled = true

[lua]
disabled = true

[package]
disabled = true

[git_status]
format = '[$conflicted$stashed$staged$modified$untracked$ahead_behind]($style) '
style = "red"
modified = " "
staged = " "
stashed = " "
conflicted = " "
untracked = "? "
ahead = " "
behind = " "
diverged = " "
ignore_submodules = true

[git_branch]
format = "[ $branch]($style) "
style = "sapphire"

[git_commit]
disabled = true

[git_state]
disabled = true

[git_metrics]
disabled = true

[directory]
format = "[ $path]($style) "
truncation_length = 3
style = "pink"
truncate_to_repo = true

[cmd_duration]
format = "[took $duration]($style) "
style = "overlay2"

[status]
disabled = false
format = "[exit $status]($style) "
style = "red"

[character]
success_symbol = "[❯](pink)"
error_symbol = "[❯](red)"
