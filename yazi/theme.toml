# Catppuccin Mocha theme for Yazi

[mgr]
border_style = { fg = "#6c7086" }
cwd = { fg = "#89dceb" }
hovered = { bg = "#313244", fg = "#cdd6f4", bold = true }
preview_hovered = { bg = "#181825", fg = "#cdd6f4", bold = true }
find_keyword = { fg = "#f5c2e7", bold = true }
find_position = { fg = "#6c7086" }
marker_selected = { bg = "#313244", fg = "#cba6f7" }
marker_copied = { bg = "#f5c2e7", fg = "#f5c2e7" }
marker_cut = { bg = "#f38ba8", fg = "#f38ba8" }
tab_active = { bg = "#74c7ec", fg = "#1e1e2e" }
tab_inactive = { bg = "#181825", fg = "#6c7086" }

count_selected = { bg = "#cba6f7", fg = "#1e1e2e" }
count_copied = { bg = "#f5c2e7", fg = "#1e1e2e" }
count_cut = { bg = "#f38ba8", fg = "#1e1e2e" }

[status]
separator_open = ""
separator_close = ""
mode_normal = { bg = "#74c7ec", fg = "#1e1e2e", bold = true }
mode_select = { bg = "#f5c2e7", fg = "#1e1e2e", bold = true }
mode_unset = { bg = "#f38ba8", fg = "#1e1e2e", bold = true }
permissions_r = { fg = "#89dceb" }
permissions_w = { fg = "#f38ba8" }
permissions_x = { fg = "#f5c2e7" }
permissions_s = { fg = "#6c7086" }
permissions_t = { fg = "#74c7ec" }
progress_label = { fg = "#cdd6f4" }
progress_normal = { fg = "#74c7ec" }
progress_error = { fg = "#f38ba8" }

[completion]
active = { bg = "#313244", fg = "#cba6f7" }
inactive = { fg = "#6c7086" }
border = { fg = "#6c7086" }

[input]
border = { fg = "#6c7086" }
title = { fg = "#cdd6f4" }
value = { fg = "#cdd6f4" }
selected = { bg = "#313244" }

[select]
active = { fg = "#cba6f7" }
inactive = { fg = "#6c7086" }
border = { fg = "#6c7086" }

[help]
on = { fg = "#cba6f7" }
run = { fg = "#89dceb" }
desc = { fg = "#6c7086" }
hovered = { bg = "#313244", fg = "#cdd6f4" }
footer = { fg = "#6c7086" }

[filetype]
rules = [
  { mime = "image/*", fg = "#89dceb" },
  { mime = "video/*", fg = "#89dceb" },
  { mime = "audio/*", fg = "#89dceb" },
  { mime = "application/zip", fg = "#cba6f7" },
  { mime = "application/gzip", fg = "#cba6f7" },
  { mime = "application/x-tar", fg = "#cba6f7" },
  { mime = "application/x-bzip", fg = "#cba6f7" },
  { mime = "application/x-bzip2", fg = "#cba6f7" },
  { mime = "application/x-7z-compressed", fg = "#cba6f7" },
  { mime = "application/x-rar", fg = "#cba6f7" },
  { mime = "application/pdf", fg = "#f38ba8" },
  { mime = "inode/directory", fg = "#74c7ec", bold = true },
  { mime = "*", fg = "#cdd6f4" }
]

[tasks]
border = { fg = "#6c7086" }
title = { fg = "#cdd6f4" }
hovered = { bg = "#313244", fg = "#cdd6f4" }

[which]
mask = { bg = "#1e1e2e" }
cand = { fg = "#89dceb" }
rest = { fg = "#6c7086" }
desc = { fg = "#6c7086" }
separator_style = { fg = "#6c7086" }
