# Rose Pine Moon theme for Yazi

[mgr]
border_style = { fg = "#6e6a86" }
cwd = { fg = "#9ccfd8" }
hovered = { bg = "#393552", fg = "#e0def4", bold = true }
preview_hovered = { bg = "#2a273f", fg = "#e0def4", bold = true }
find_keyword = { fg = "#ea9a97", bold = true }
find_position = { fg = "#6e6a86" }
marker_selected = { bg = "#393552", fg = "#c4a7e7" }
marker_copied = { bg = "#ea9a97", fg = "#ea9a97" }
marker_cut = { bg = "#eb6f92", fg = "#eb6f92" }
tab_active = { bg = "#3e8fb0", fg = "#232136" }
tab_inactive = { bg = "#2a273f", fg = "#6e6a86" }

count_selected = { bg = "#c4a7e7", fg = "#232136" }
count_copied = { bg = "#ea9a97", fg = "#232136" }
count_cut = { bg = "#eb6f92", fg = "#232136" }

[status]
separator_open = ""
separator_close = ""
mode_normal = { bg = "#3e8fb0", fg = "#232136", bold = true }
mode_select = { bg = "#ea9a97", fg = "#232136", bold = true }
mode_unset = { bg = "#eb6f92", fg = "#232136", bold = true }
permissions_r = { fg = "#9ccfd8" }
permissions_w = { fg = "#eb6f92" }
permissions_x = { fg = "#ea9a97" }
permissions_s = { fg = "#6e6a86" }
permissions_t = { fg = "#3e8fb0" }
progress_label = { fg = "#e0def4" }
progress_normal = { fg = "#3e8fb0" }
progress_error = { fg = "#eb6f92" }

[completion]
active = { bg = "#393552", fg = "#c4a7e7" }
inactive = { fg = "#6e6a86" }
border = { fg = "#6e6a86" }

[input]
border = { fg = "#6e6a86" }
title = { fg = "#e0def4" }
value = { fg = "#e0def4" }
selected = { bg = "#393552" }

[select]
active = { fg = "#c4a7e7" }
inactive = { fg = "#6e6a86" }
border = { fg = "#6e6a86" }

[help]
on = { fg = "#c4a7e7" }
run = { fg = "#9ccfd8" }
desc = { fg = "#6e6a86" }
hovered = { bg = "#393552", fg = "#e0def4" }
footer = { fg = "#6e6a86" }

[filetype]
rules = [
  { mime = "image/*", fg = "#9ccfd8" },
  { mime = "video/*", fg = "#9ccfd8" },
  { mime = "audio/*", fg = "#9ccfd8" },
  { mime = "application/zip", fg = "#c4a7e7" },
  { mime = "application/gzip", fg = "#c4a7e7" },
  { mime = "application/x-tar", fg = "#c4a7e7" },
  { mime = "application/x-bzip", fg = "#c4a7e7" },
  { mime = "application/x-bzip2", fg = "#c4a7e7" },
  { mime = "application/x-7z-compressed", fg = "#c4a7e7" },
  { mime = "application/x-rar", fg = "#c4a7e7" },
  { mime = "application/pdf", fg = "#eb6f92" },
  { mime = "inode/directory", fg = "#3e8fb0", bold = true },
  { mime = "*", fg = "#e0def4" }
]

[tasks]
border = { fg = "#6e6a86" }
title = { fg = "#e0def4" }
hovered = { bg = "#393552", fg = "#e0def4" }

[which]
mask = { bg = "#232136" }
cand = { fg = "#9ccfd8" }
rest = { fg = "#6e6a86" }
desc = { fg = "#6e6a86" }
separator_style = { fg = "#6e6a86" }
