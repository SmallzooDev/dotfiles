# Kanagawa theme for Yazi

[mgr]
border_style = { fg = "#54546D" }
cwd = { fg = "#7FB4CA" }
hovered = { bg = "#2A2A37", fg = "#DCD7BA", bold = true }
preview_hovered = { bg = "#1F1F28", fg = "#DCD7BA", bold = true }
find_keyword = { fg = "#98BB6C", bold = true }
find_position = { fg = "#54546D" }
marker_selected = { bg = "#2A2A37", fg = "#957FB8" }
marker_copied = { bg = "#98BB6C", fg = "#98BB6C" }
marker_cut = { bg = "#FF5D62", fg = "#FF5D62" }
tab_active = { bg = "#7E9CD8", fg = "#1F1F28" }
tab_inactive = { bg = "#2A2A37", fg = "#54546D" }

count_selected = { bg = "#957FB8", fg = "#1F1F28" }
count_copied = { bg = "#98BB6C", fg = "#1F1F28" }
count_cut = { bg = "#FF5D62", fg = "#1F1F28" }

[status]
separator_open = ""
separator_close = ""
mode_normal = { bg = "#7E9CD8", fg = "#1F1F28", bold = true }
mode_select = { bg = "#98BB6C", fg = "#1F1F28", bold = true }
mode_unset = { bg = "#FF5D62", fg = "#1F1F28", bold = true }
permissions_r = { fg = "#7FB4CA" }
permissions_w = { fg = "#FF5D62" }
permissions_x = { fg = "#98BB6C" }
permissions_s = { fg = "#54546D" }
permissions_t = { fg = "#7E9CD8" }
progress_label = { fg = "#DCD7BA" }
progress_normal = { fg = "#7E9CD8" }
progress_error = { fg = "#FF5D62" }

[completion]
active = { bg = "#2A2A37", fg = "#957FB8" }
inactive = { fg = "#54546D" }
border = { fg = "#54546D" }

[input]
border = { fg = "#54546D" }
title = { fg = "#DCD7BA" }
value = { fg = "#DCD7BA" }
selected = { bg = "#2A2A37" }

[select]
active = { fg = "#957FB8" }
inactive = { fg = "#54546D" }
border = { fg = "#54546D" }

[help]
on = { fg = "#957FB8" }
run = { fg = "#7FB4CA" }
desc = { fg = "#54546D" }
hovered = { bg = "#2A2A37", fg = "#DCD7BA" }
footer = { fg = "#54546D" }

[filetype]
rules = [
  { mime = "image/*", fg = "#7FB4CA" },
  { mime = "video/*", fg = "#7FB4CA" },
  { mime = "audio/*", fg = "#7FB4CA" },
  { mime = "application/zip", fg = "#957FB8" },
  { mime = "application/gzip", fg = "#957FB8" },
  { mime = "application/x-tar", fg = "#957FB8" },
  { mime = "application/x-bzip", fg = "#957FB8" },
  { mime = "application/x-bzip2", fg = "#957FB8" },
  { mime = "application/x-7z-compressed", fg = "#957FB8" },
  { mime = "application/x-rar", fg = "#957FB8" },
  { mime = "application/pdf", fg = "#FF5D62" },
  { mime = "inode/directory", fg = "#7E9CD8", bold = true },
  { mime = "*", fg = "#DCD7BA" }
]

[tasks]
border = { fg = "#54546D" }
title = { fg = "#DCD7BA" }
hovered = { bg = "#2A2A37", fg = "#DCD7BA" }

[which]
mask = { bg = "#1F1F28" }
cand = { fg = "#7FB4CA" }
rest = { fg = "#54546D" }
desc = { fg = "#54546D" }
separator_style = { fg = "#54546D" }
