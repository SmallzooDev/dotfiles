# Cyberdream theme for Yazi
# palette: bg=#16181a surface=#3c4048 gray=#7b8496 fg=#ffffff
#          red=#ff6e5e green=#5eff6c yellow=#f1ff5e blue=#5ea1ff
#          magenta=#bd5eff pink=#ff5ea0 cyan=#5ef1ff orange=#ffbd5e

[mgr]
border_style = { fg = "#7b8496" }
cwd = { fg = "#5ef1ff" }
hovered = { bg = "#3c4048", fg = "#ffffff", bold = true }
preview_hovered = { bg = "#16181a", fg = "#ffffff", bold = true }
find_keyword = { fg = "#ff5ea0", bold = true }
find_position = { fg = "#7b8496" }
marker_selected = { bg = "#3c4048", fg = "#bd5eff" }
marker_copied = { bg = "#ff5ea0", fg = "#ff5ea0" }
marker_cut = { bg = "#ff6e5e", fg = "#ff6e5e" }
tab_active = { bg = "#5ea1ff", fg = "#16181a" }
tab_inactive = { bg = "#16181a", fg = "#7b8496" }

count_selected = { bg = "#bd5eff", fg = "#16181a" }
count_copied = { bg = "#ff5ea0", fg = "#16181a" }
count_cut = { bg = "#ff6e5e", fg = "#16181a" }

[status]
separator_open = ""
separator_close = ""
mode_normal = { bg = "#5ea1ff", fg = "#16181a", bold = true }
mode_select = { bg = "#ff5ea0", fg = "#16181a", bold = true }
mode_unset = { bg = "#ff6e5e", fg = "#16181a", bold = true }
permissions_r = { fg = "#5ef1ff" }
permissions_w = { fg = "#ff6e5e" }
permissions_x = { fg = "#ff5ea0" }
permissions_s = { fg = "#7b8496" }
permissions_t = { fg = "#5ea1ff" }
progress_label = { fg = "#ffffff" }
progress_normal = { fg = "#5ea1ff" }
progress_error = { fg = "#ff6e5e" }

[completion]
active = { bg = "#3c4048", fg = "#bd5eff" }
inactive = { fg = "#7b8496" }
border = { fg = "#7b8496" }

[input]
border = { fg = "#7b8496" }
title = { fg = "#ffffff" }
value = { fg = "#ffffff" }
selected = { bg = "#3c4048" }

[select]
active = { fg = "#bd5eff" }
inactive = { fg = "#7b8496" }
border = { fg = "#7b8496" }

[help]
on = { fg = "#bd5eff" }
run = { fg = "#5ef1ff" }
desc = { fg = "#7b8496" }
hovered = { bg = "#3c4048", fg = "#ffffff" }
footer = { fg = "#7b8496" }

[filetype]
rules = [
  { mime = "image/*", fg = "#5ef1ff" },
  { mime = "video/*", fg = "#5ef1ff" },
  { mime = "audio/*", fg = "#5ef1ff" },
  { mime = "application/zip", fg = "#bd5eff" },
  { mime = "application/gzip", fg = "#bd5eff" },
  { mime = "application/x-tar", fg = "#bd5eff" },
  { mime = "application/x-bzip", fg = "#bd5eff" },
  { mime = "application/x-bzip2", fg = "#bd5eff" },
  { mime = "application/x-7z-compressed", fg = "#bd5eff" },
  { mime = "application/x-rar", fg = "#bd5eff" },
  { mime = "application/pdf", fg = "#ff6e5e" },
  { mime = "inode/directory", fg = "#5ea1ff", bold = true },
  { mime = "*", fg = "#ffffff" }
]

[tasks]
border = { fg = "#7b8496" }
title = { fg = "#ffffff" }
hovered = { bg = "#3c4048", fg = "#ffffff" }

[which]
mask = { bg = "#16181a" }
cand = { fg = "#5ef1ff" }
rest = { fg = "#7b8496" }
desc = { fg = "#7b8496" }
separator_style = { fg = "#7b8496" }
