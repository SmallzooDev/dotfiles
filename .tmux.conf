set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g allow-passthrough on
set -g focus-events on

set -g prefix C-f
unbind C-b
bind-key C-f send-prefix

unbind %
unbind '"'
unbind 's'
unbind 'v'
unbind 'f'
unbind '['
unbind Space

bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

unbind r
bind r source-file ~/.tmux.conf

bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse off

set-window-option -g mode-keys vi

bind Enter copy-mode \; send -X start-of-line
bind -n M-v copy-mode \; send -X start-of-line

bind-key -T copy-mode-vi 'v' send -X begin-selection 
bind-key -T copy-mode-vi 'y' send -X copy-selection 
bind-key -T copy-mode-vi 'C-v' send -X begin-selection \; send -X rectangle-toggle
bind-key -T copy-mode-vi '/'   send -X search-forward
bind-key -T copy-mode-vi '?'   send -X search-backward

bind-key -T copy-mode-vi 'g' switch-client -T copy-mode-g
bind-key -T copy-mode-g  's' send -X start-of-line
bind-key -T copy-mode-g  'l' send -X end-of-line
bind-key -T copy-mode-g  'g' send -X history-top
bind-key -T copy-mode-g  'e' send -X previous-word-end

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

set -sg escape-time 10
set -g renumber-windows on
set -g base-index 1

set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'fcsonline/tmux-thumbs'

set -g @extrakto_key 'tab'
set -g @extrakto_default_opt 'word'
set -g @extrakto_split_direction 'p'
set -g @extrakto_popup_size '80%'

set -g @thumbs-key f
set -g @thumbs-alphabet qwerty-homerow
set -g @thumbs-reverse enabled
set -g @thumbs-unique enabled
set -g @thumbs-command 'tmux set-buffer -w -- {} && tmux display-message "Copied: {}"'
set -g @thumbs-upcase-command 'tmux set-buffer -w -- {} && tmux send-keys -- {}'

set -g status-interval 10         # update the status bar every 10 seconds
set -g status-justify left
set -g status-position top
set -g status-left-length 200     # increase length (from 10)
set -g status-style 'bg=default'  # transparent background


# STATUS BAR STYLE - CATPPUCCIN MOCHA
set -g status-left '#{?client_prefix,#[fg=#f5c2e7#,bg=default]#[fg=#1e1e2e#,bg=#f5c2e7]  #S #[fg=#f5c2e7#,bg=default],#[fg=#94e2d5#,bg=default]#[fg=#1e1e2e#,bg=#94e2d5]  #S #[fg=#94e2d5#,bg=default]}#[fg=#94e2d5,bg=default] |'
set -g status-right '#[fg=#94e2d5,bg=default]#[fg=#94e2d5,bg=default]| #[fg=#94e2d5,bg=default]#[fg=#1e1e2e,bg=#94e2d5]%m/%d/%y#[fg=#94e2d5,bg=default]'
set -g window-status-current-format '#[fg=#94e2d5,bg=default] #[fg=#1e1e2e,bg=#94e2d5]#I#W#[fg=#94e2d5,bg=default]'
set -g window-status-format '#[fg=#6c7086,bg=default]  #I #W '

set -g window-status-last-style 'fg=#cdd6f4,bg=default'
set -g pane-border-style 'fg=#6c7086'
set -g pane-active-border-style 'fg=#94e2d5'
set -g default-terminal "${TERM}"
set -g message-command-style bg=default,fg=#cdd6f4
set -g message-style bg=default,fg=#cdd6f4
set -g mode-style bg=#6c7086,fg=#cdd6f4

# Window navigation
bind p previous-window
bind n next-window
bind -n M-h previous-window
bind -n M-l next-window


# === POPUP CONFIGURATION ===
bind Space if-shell -F '#{==:#{session_name},scratch}' \
  { detach-client } \
  { display-popup -b rounded -d '#{pane_current_path}' -xC -yC -w90% -h90% -E 'tmux new-session -A -s scratch' }

# Instant popups
bind g display-popup -b rounded -d '#{pane_current_path}' -xC -yC -w90% -h90% -E "lazygit"
bind N display-popup -b rounded -d '~/private_vault' -xC -yC -w80% -h80% -E "nvim ~/private_vault/home.md"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
